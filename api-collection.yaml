openapi: 3.0.3
info:
  title: 'Learnoo API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'https://api.learnoo.app'
tags:
  -
    name: Authentication
    description: ''
  -
    name: Center
    description: ''
  -
    name: Chapter
    description: ''
  -
    name: Codes
    description: ''
  -
    name: Course
    description: ''
  -
    name: Dashboard
    description: ''
  -
    name: Department
    description: ''
  -
    name: Discussion
    description: ''
  -
    name: Faculty
    description: ''
  -
    name: Lecture
    description: ''
  -
    name: Library
    description: ''
  -
    name: 'Live Room'
    description: ''
  -
    name: Note
    description: ''
  -
    name: Posts
    description: ''
  -
    name: 'Quiz & Exam'
    description: ''
  -
    name: 'Quiz Answer'
    description: ''
  -
    name: 'Quiz Attempt'
    description: ''
  -
    name: 'Quiz Question'
    description: ''
  -
    name: Search
    description: ''
  -
    name: University
    description: ''
  -
    name: 'User Progress'
    description: ''
  -
    name: Users
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Get a bearer token from the `POST /v1/auth/login` endpoint.'
security:
  -
    default: []
paths:
  /v1/auth/register:
    post:
      summary: Register
      operationId: register
      description: 'Create a new account and issue a Sanctum bearer token.'
      parameters: []
      responses:
        201:
          description: 'Registration succeeded.'
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: ''
                    type: users
                    attributes:
                      first_name: Christelle
                      last_name: Bailey
                      phone: null
                      role: Unknown
                      email: rowan.gulgowski@example.com
                      email_verified_at: '2026-04-09T22:39:24+00:00'
                      created_at: null
                      updated_at: null
                  meta:
                    token: 1|example-token
                    token_type: Bearer
                    expires_at: null
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: ''
                      type:
                        type: string
                        example: users
                      attributes:
                        type: object
                        properties:
                          first_name:
                            type: string
                            example: Christelle
                          last_name:
                            type: string
                            example: Bailey
                          phone:
                            type: string
                            example: null
                            nullable: true
                          role:
                            type: string
                            example: Unknown
                          email:
                            type: string
                            example: rowan.gulgowski@example.com
                          email_verified_at:
                            type: string
                            example: '2026-04-09T22:39:24+00:00'
                          created_at:
                            type: string
                            example: null
                            nullable: true
                          updated_at:
                            type: string
                            example: null
                            nullable: true
                  meta:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|example-token
                      token_type:
                        type: string
                        example: Bearer
                      expires_at:
                        type: string
                        example: null
                        nullable: true
        422:
          description: 'Validation failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The given data was invalid.'
                  errors:
                    email:
                      - 'The email has already been taken.'
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The email has already been taken.'
                        items:
                          type: string
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                  description: 'Display first name for the account.'
                  example: Jane
                last_name:
                  type: string
                  description: 'Display last name for the account.'
                  example: Doe
                phone:
                  type: integer
                  description: 'Unique phone for login.'
                  example: '201200000000'
                email:
                  type: string
                  description: 'Unique email for login.'
                  example: text@example.com
                password:
                  type: string
                  description: 'Account password.'
                  example: password123
                device_name:
                  type: string
                  description: 'Client device label for token tracking.'
                  example: ios-app
              required:
                - first_name
                - last_name
                - password
      security: []
  /v1/auth/login:
    post:
      summary: Login
      operationId: login
      description: 'Authenticate a user and issue a Sanctum bearer token.'
      parameters: []
      responses:
        200:
          description: 'Login succeeded.'
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: ''
                    type: users
                    attributes:
                      first_name: Christelle
                      last_name: Bailey
                      phone: null
                      role: Unknown
                      email: jdach@example.org
                      email_verified_at: '2026-04-09T22:39:25+00:00'
                      created_at: null
                      updated_at: null
                  meta:
                    token: 1|example-token
                    token_type: Bearer
                    expires_at: null
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: ''
                      type:
                        type: string
                        example: users
                      attributes:
                        type: object
                        properties:
                          first_name:
                            type: string
                            example: Christelle
                          last_name:
                            type: string
                            example: Bailey
                          phone:
                            type: string
                            example: null
                            nullable: true
                          role:
                            type: string
                            example: Unknown
                          email:
                            type: string
                            example: jdach@example.org
                          email_verified_at:
                            type: string
                            example: '2026-04-09T22:39:25+00:00'
                          created_at:
                            type: string
                            example: null
                            nullable: true
                          updated_at:
                            type: string
                            example: null
                            nullable: true
                  meta:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|example-token
                      token_type:
                        type: string
                        example: Bearer
                      expires_at:
                        type: string
                        example: null
                        nullable: true
        422:
          description: 'Credentials were invalid.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The given data was invalid.'
                  errors:
                    email:
                      - 'The provided credentials are incorrect.'
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The provided credentials are incorrect.'
                        items:
                          type: string
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone_or_email:
                  type: string
                  description: 'Unique phone|email for login.'
                  example: karl@learnoo.com
                password:
                  type: string
                  description: 'User password.'
                  example: karl@learnoo.com
                device_name:
                  type: string
                  description: 'Client device label for token tracking.'
                  example: ios-app
              required:
                - password
                - device_name
      security: []
  /v1/auth/password/forgot:
    post:
      summary: 'Request Password Reset'
      operationId: requestPasswordReset
      description: 'Send a password reset link to the provided email if an account exists.'
      parameters: []
      responses:
        200:
          description: 'Password reset request accepted.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'If the account exists, a password reset link has been sent.'
                properties:
                  message:
                    type: string
                    example: 'If the account exists, a password reset link has been sent.'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone_or_email:
                  type: string
                  description: 'Account email/phone address.'
                  example: 201200000000|jane@example.com
              required:
                - phone_or_email
      security: []
  /v1/auth/password/reset:
    post:
      summary: 'Reset Password'
      operationId: resetPassword
      description: 'Reset the user password using a valid reset token.'
      parameters: []
      responses:
        200:
          description: 'Password reset succeeded.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Your password has been reset.'
                properties:
                  message:
                    type: string
                    example: 'Your password has been reset.'
        422:
          description: 'Reset token or payload was invalid.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The given data was invalid.'
                  errors:
                    email:
                      - 'This password reset token is invalid.'
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'This password reset token is invalid.'
                        items:
                          type: string
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: Type.
                  example: verify
                  enum:
                    - verify
                    - reset
                code:
                  type: string
                  description: 'Password reset token.'
                  example: XXXXXX
                phone_or_email:
                  type: string
                  description: 'Account email/phone.'
                  example: jane@example.com
                password:
                  type: string
                  description: 'New account password.'
                  example: new-password123
                password_confirmation:
                  type: string
                  description: 'Must match password.'
                  example: new-password123
              required:
                - type
                - code
                - phone_or_email
                - password
                - password_confirmation
      security: []
  /v1/auth/me:
    get:
      summary: 'Get Current User'
      operationId: getCurrentUser
      description: 'Return the authenticated user for the current bearer token.'
      parameters: []
      responses:
        200:
          description: 'Authenticated user profile.'
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: ''
                    type: users
                    attributes:
                      first_name: Morgan
                      last_name: Hirthe
                      phone: null
                      role: Unknown
                      email: dare.emelie@example.com
                      email_verified_at: '2026-04-09T22:39:25+00:00'
                      created_at: null
                      updated_at: null
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: ''
                      type:
                        type: string
                        example: users
                      attributes:
                        type: object
                        properties:
                          first_name:
                            type: string
                            example: Morgan
                          last_name:
                            type: string
                            example: Hirthe
                          phone:
                            type: string
                            example: null
                            nullable: true
                          role:
                            type: string
                            example: Unknown
                          email:
                            type: string
                            example: dare.emelie@example.com
                          email_verified_at:
                            type: string
                            example: '2026-04-09T22:39:25+00:00'
                          created_at:
                            type: string
                            example: null
                            nullable: true
                          updated_at:
                            type: string
                            example: null
                            nullable: true
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /v1/auth/update:
    put:
      summary: 'Update Current User'
      operationId: updateCurrentUser
      description: 'Return the authenticated user after update for the current bearer token.'
      parameters: []
      responses:
        200:
          description: 'Authenticated user profile.'
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: ''
                    type: users
                    attributes:
                      first_name: Audra
                      last_name: Crooks
                      phone: null
                      role: Unknown
                      email: rempel.chadrick@example.org
                      email_verified_at: '2026-04-09T22:39:25+00:00'
                      created_at: null
                      updated_at: null
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: ''
                      type:
                        type: string
                        example: users
                      attributes:
                        type: object
                        properties:
                          first_name:
                            type: string
                            example: Audra
                          last_name:
                            type: string
                            example: Crooks
                          phone:
                            type: string
                            example: null
                            nullable: true
                          role:
                            type: string
                            example: Unknown
                          email:
                            type: string
                            example: rempel.chadrick@example.org
                          email_verified_at:
                            type: string
                            example: '2026-04-09T22:39:25+00:00'
                          created_at:
                            type: string
                            example: null
                            nullable: true
                          updated_at:
                            type: string
                            example: null
                            nullable: true
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                  description: 'Display first name for the account.'
                  example: ''
                last_name:
                  type: string
                  description: 'Display last name for the account.'
                  example: ''
                university_id:
                  type: integer
                  description: 'Display last name for the account.'
                  example: ''
                centers:
                  type: array
                  description: ''
                  example:
                    - 4326.41688
                  items:
                    type: number
                faculty_id:
                  type: integer
                  description: 'Display last name for the account.'
                  example: ''
                phone:
                  type: integer
                  description: 'Unique phone for login.'
                  example: ''
                email:
                  type: string
                  description: 'Unique email for login.'
                  example: ''
                password:
                  type: string
                  description: 'Account password.'
                  example: ''
                device_name:
                  type: string
                  description: 'Client device label for token tracking.'
                  example: ''
              required:
                - first_name
                - last_name
                - university_id
                - centers
                - faculty_id
                - password
  /v1/auth/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Revoke the current Sanctum token.'
      parameters: []
      responses:
        204:
          description: 'Token revoked.'
          content:
            application/json:
              schema:
                type: object
                nullable: true
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /v1/auth/tokens:
    get:
      summary: 'List Tokens'
      operationId: listTokens
      description: 'List personal access tokens for the authenticated user.'
      parameters: []
      responses:
        200:
          description: 'Token list payload.'
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: '1'
                      type: personal-access-tokens
                      attributes:
                        name: ios-app
                        abilities:
                          - 'auth:me'
                          - 'auth:logout'
                        last_used_at: null
                        expires_at: '2026-02-24T12:00:00+00:00'
                        created_at: '2026-02-23T12:00:00+00:00'
                        updated_at: '2026-02-23T12:00:00+00:00'
                        is_current: true
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: '1'
                        type: personal-access-tokens
                        attributes:
                          name: ios-app
                          abilities:
                            - 'auth:me'
                            - 'auth:logout'
                          last_used_at: null
                          expires_at: '2026-02-24T12:00:00+00:00'
                          created_at: '2026-02-23T12:00:00+00:00'
                          updated_at: '2026-02-23T12:00:00+00:00'
                          is_current: true
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: '1'
                        type:
                          type: string
                          example: personal-access-tokens
                        attributes:
                          type: object
                          properties:
                            name:
                              type: string
                              example: ios-app
                            abilities:
                              type: array
                              example:
                                - 'auth:me'
                                - 'auth:logout'
                              items:
                                type: string
                            last_used_at:
                              type: string
                              example: null
                              nullable: true
                            expires_at:
                              type: string
                              example: '2026-02-24T12:00:00+00:00'
                            created_at:
                              type: string
                              example: '2026-02-23T12:00:00+00:00'
                            updated_at:
                              type: string
                              example: '2026-02-23T12:00:00+00:00'
                            is_current:
                              type: boolean
                              example: true
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        403:
          description: 'Token is missing required ability.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Forbidden.
                properties:
                  message:
                    type: string
                    example: Forbidden.
      tags:
        - Authentication
    delete:
      summary: 'Revoke All Tokens'
      operationId: revokeAllTokens
      description: 'Revoke all personal access tokens for the authenticated user.'
      parameters: []
      responses:
        204:
          description: 'All tokens revoked.'
          content:
            application/json:
              schema:
                type: object
                nullable: true
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        403:
          description: 'Token is missing required ability.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Forbidden.
                properties:
                  message:
                    type: string
                    example: Forbidden.
      tags:
        - Authentication
  '/v1/auth/tokens/{token_id}':
    delete:
      summary: 'Revoke Token'
      operationId: revokeToken
      description: 'Revoke one personal access token owned by the authenticated user.'
      parameters: []
      responses:
        204:
          description: 'Token revoked.'
          content:
            application/json:
              schema:
                type: object
                nullable: true
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        403:
          description: 'Token is missing required ability.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Forbidden.
                properties:
                  message:
                    type: string
                    example: Forbidden.
        404:
          description: 'Token does not belong to current user or no longer exists.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Token not found.'
                properties:
                  message:
                    type: string
                    example: 'Token not found.'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token_id:
                  type: integer
                  description: ''
                  example: 16
              required:
                - token_id
    parameters:
      -
        in: path
        name: token_id
        description: 'Personal access token id.'
        example: 42
        required: true
        schema:
          type: integer
  /v1/auth/email/verification-notification:
    post:
      summary: 'Send Verification Email'
      operationId: sendVerificationEmail
      description: 'Send (or resend) an email verification link to the authenticated user.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: 'Verification email queued/sent.'
                    type: object
                    example:
                      message: 'Verification link sent.'
                    properties:
                      message:
                        type: string
                        example: 'Verification link sent.'
                  -
                    description: 'User already verified.'
                    type: object
                    example:
                      message: 'Email is already verified.'
                    properties:
                      message:
                        type: string
                        example: 'Email is already verified.'
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /v1/auth/phone/verification-notification:
    post:
      summary: 'Send Verification Phone'
      operationId: sendVerificationPhone
      description: 'Send (or resend) an email verification link to the authenticated user.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: 'Verification phone queued/sent.'
                    type: object
                    example:
                      message: 'Verification link sent.'
                    properties:
                      message:
                        type: string
                        example: 'Verification link sent.'
                  -
                    description: 'User already verified.'
                    type: object
                    example:
                      message: 'Phone is already verified.'
                    properties:
                      message:
                        type: string
                        example: 'Phone is already verified.'
        401:
          description: 'Authentication failed.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /v1/auth/email/verify:
    post:
      summary: 'Verify Email'
      operationId: verifyEmail
      description: 'Verify a user email using the signed verification OTP.'
      parameters: []
      responses:
        200:
          description: 'Email was verified.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Email verified successfully.'
                properties:
                  message:
                    type: string
                    example: 'Email verified successfully.'
        403:
          description: 'OTP was invalid, expired, or mismatched.'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Invalid verification code.'
                properties:
                  message:
                    type: string
                    example: 'Invalid verification code.'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: 'OTP code.'
                  example: '******'
              required:
                - code
  /v1/center:
    get:
      summary: ''
      operationId: getV1Center
      description: ''
      parameters:
        -
          in: query
          name: search
          description: 'Search by name or location'
          example: dokki
          required: false
          schema:
            type: string
            description: 'Search by name or location'
            example: dokki
        -
          in: query
          name: status
          description: 'Filter by status (active, inactive)'
          example: active
          required: false
          schema:
            type: string
            description: 'Filter by status (active, inactive)'
            example: active
        -
          in: query
          name: type
          description: 'Filter by type (physical, virtual)'
          example: physical
          required: false
          schema:
            type: string
            description: 'Filter by type (physical, virtual)'
            example: physical
        -
          in: query
          name: per_page
          description: 'Items per page'
          example: 10
          required: false
          schema:
            type: integer
            description: 'Items per page'
            example: 10
